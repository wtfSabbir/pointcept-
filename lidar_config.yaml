# ==============================================================================
# MASTER CONFIG: Sabbir Urban LiDAR Project
# Contains both Data Prep settings AND Training settings.
# ==============================================================================

# ------------------------------------------------------------------------------
# SECTION A: PREPROCESSING (Used by data_preprocessing.py)
# ------------------------------------------------------------------------------
preprocessing:
  # Where your .laz files are right now
  raw_root: "/mnt/d/PointCloudsFiles/ptv3/data/laz"
  
  # Where the script will save the .npy files (Training reads from here)
  processed_root: "/mnt/d/PointCloudsFiles/ptv3/data/npy"

  # The Logic: Raw_ID -> Training_ID (255 = Ignore)
  class_map:
    0: 255   # Unknown -> Ignore
    1: 0     # Ground
    2: 1     # Pole
    3: 2     # Sign
    4: 3     # Bollard
    5: 4     # Trunk
    6: 5     # Vegetation
    7: 6     # Building
    9: 7     # Fence
    10: 8    # Gate/Barrier

# ------------------------------------------------------------------------------
# SECTION B: TRAINING (Used by Pointcept train.py)
# ------------------------------------------------------------------------------
weight: null
resume: false
evaluate: true
test_only: false
seed: 4880
save_path: "/mnt/d/PointCloudsFiles/ptv3/weights"

data:
  train:
    type: LidarDataset
    # Pointing to the OUTPUT of Section A
    data_root: "/mnt/d/PointCloudsFiles/ptv3/data/npy"
    split: "train"
    voxel_size: 0.05
    loop: 10
  val:
    type: LidarDataset
    data_root: "/mnt/d/PointCloudsFiles/ptv3/data/npy"
    split: "val"
    voxel_size: 0.05
    loop: 1
    
  transform:
    train:
      - {type: RandomRotate, angle: [-1, 1], axis: z, center: true, p: 0.5}
      - {type: RandomScale, scale: [0.9, 1.1]}
      - {type: RandomFlip, p: 0.5}
      - {type: RandomJitter, sigma: 0.005, clip: 0.02}
      - {type: GridSample, grid_size: 0.05, hash_type: fnv, mode: train, keys: [coord, strength, segment], return_grid_coord: true}
      # CRITICAL: Crops random 80k points to fit in 8GB VRAM
      - {type: SphereCrop, point_max: 80000, mode: random} 
      - {type: ToTensor}
      - {type: Collect, keys: [coord, grid_coord, segment, feat], feat_keys: [coord, strength]}
    val:
      - {type: GridSample, grid_size: 0.05, hash_type: fnv, mode: train, keys: [coord, strength, segment], return_grid_coord: true}
      - {type: ToTensor}
      - {type: Collect, keys: [coord, grid_coord, segment, feat], feat_keys: [coord, strength]}

model:
  type: DefaultSegmentor
  backbone:
    type: PointTransformerV3
    in_channels: 4
    num_classes: 9  # 0 to 8
    enable_flash: false
    enable_rearrest: false
    patch_embed_depth: 2
    patch_embed_channels: 48
    patch_embed_groups: 6
    patch_embed_neighbours: 16
    enc_depths: [2, 2, 6, 2]
    enc_channels: [96, 192, 384, 512]
    enc_groups: [12, 24, 48, 48]
    enc_neighbours: [16, 16, 16, 16]
    dec_depths: [1, 1, 1, 1]
    dec_channels: [48, 96, 192, 384]
    dec_groups: [12, 24, 48, 48]
    dec_neighbours: [16, 16, 16, 16]
  criteria:
    - {type: CrossEntropyLoss, loss_weight: 1.0, ignore_index: 255}
    - {type: LovaszLoss, mode: multiclass, loss_weight: 1.0, ignore_index: 255}

optimizer:
  type: AdamW
  lr: 0.005
  weight_decay: 0.05

scheduler:
  type: OneCycleLR
  max_lr: 0.005
  pct_start: 0.04
  div_factor: 10
  final_div_factor: 100
  total_steps: 60

epoch: 60
eval_epoch: 2
batch_size: 2
num_worker: 2
enable_amp: true
hooks:
  - {type: CheckpointLoader}
  - {type: IterationTimer, warmup_iter: 2}
  - {type: InformationWriter}
  - {type: SemSegEvaluator}
  - {type: CheckpointSaver, save_freq: 5}